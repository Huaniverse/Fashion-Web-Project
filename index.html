<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEUX | Luxury Style</title>
    <link rel="icon" href="/assets/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="assets/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header></header>

    <section class="hero">
        <div class="hero-content">
            <h1>Sắc Xanh Của <br><span>Sự Tinh Tế</span></h1>
            <button class="btn btn-primary btn-round btn-shop">Khám phá ngay</button>
        </div>
    </section>

    <section class="collection" id="hot-section">
        <div class="container">
            <h2 class="section-title">Xu Hướng <span>Mới Nhất</span></h2>
            <div class="grid" id="hot-grid" data-scrollable="true"></div>
        </div>
    </section>

    <section class="collection sale-bg" id="sale-section">
        <div class="container">
            <h2 class="section-title">Ưu Đãi <span>Đặc Biệt</span></h2>
            <div class="grid" id="sale-grid" data-scrollable="true"></div>
        </div>
    </section>

    <footer></footer>

    <script src="/assets/components.js"></script>
    <script src="/assets/main.js"></script>
</body>

</html>
